<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Document</title>
    </head>
     <body>
        <h1>Mini text analyzerr</h1>
        <textarea id="paragraphInput" placeholder="enter a paragraph" rows="6" cols="60"></textarea><br />
         <button onclick="analyzeText()">Analyse</button>
         <pre id="output"></pre>
         <script>
            function analyzeText(){
                let text=document.getElementById("paragraphInput").value;
                let totalcharacter=text.length;
                let words=text.match(/\b\w+\b/g)||[];
                let totalwords=words.length;
                let sentance=(text.match(/[.?!]/g)|| []).length;
                let unique=[...new Set(words.map((w)=>w.toLowerCase()))]   
                let output=`totalcharacter:${totalcharacter} words:${totalwords}totalsentance:${sentance}uniq:${unique}`
                document.getElementById("output").innerText=output;
                
                  }

         </script>
         
     </body>   
    </html>
